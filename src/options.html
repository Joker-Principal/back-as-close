<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Back as Close — Options</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #202124;
      background: #fff;
      margin: 0;
      padding: 32px;
      min-width: 320px;
      max-width: 480px;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin: 0 0 24px;
      color: #202124;
    }

    .field {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .field-desc {
      font-size: 12px;
      color: #5f6368;
      margin-top: 4px;
    }

    .input-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    input[type="number"] {
      width: 80px;
      padding: 6px 10px;
      border: 1px solid #dadce0;
      border-radius: 4px;
      font-size: 14px;
      color: #202124;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="number"]:focus {
      border-color: #1a73e8;
    }

    input[type="number"].invalid {
      border-color: #d93025;
    }

    .unit {
      color: #5f6368;
    }

    button {
      padding: 8px 20px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #1765cc; }
    button:active { background: #185abc; }

    #status {
      margin-top: 12px;
      font-size: 13px;
      height: 18px;
      transition: opacity 0.3s;
    }

    #status.success { color: #188038; }
    #status.error   { color: #d93025; }
    #status.hidden  { opacity: 0; }
  </style>
</head>
<body>
  <h1>Back as Close</h1>

  <div class="field">
    <label for="restore-timeout">Restore window</label>
    <div class="input-row">
      <input type="number" id="restore-timeout" min="3" max="60" step="1" />
      <span class="unit">seconds</span>
    </div>
    <p class="field-desc">
      How long forward navigation will reopen the accidentally closed tab (3–60 s).
    </p>
  </div>

  <button id="save">Save</button>
  <div id="status" class="hidden"></div>

  <script type="module" src="src/options.js"></script>
</body>
</html>
